services:
  postgres:
    image: postgres:16-alpine
    container_name: hotspot-radar-postgres
    environment:
      POSTGRES_DB: hotspot_radar
      POSTGRES_USER: hotspot
      POSTGRES_PASSWORD: hotspot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotspot -d hotspot_radar"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: hotspot-radar-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://hotspot:hotspot@postgres:5432/hotspot_radar
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000
    container_name: hotspot-radar-frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
